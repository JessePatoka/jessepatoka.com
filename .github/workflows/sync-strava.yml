name: Sync Strava Data

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
  STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
  STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Strava data
        run: node scripts/fetch-strava.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git diff --cached --quiet || git commit -m "chore: sync strava data [skip ci]"
          git push

      # TODO: Trigger a site rebuild on Cloudflare Pages / Vercel
      - name: Trigger site rebuild
        run: |
          echo "TODO: Call Cloudflare Pages deploy hook or Vercel deploy hook"
          # Example: curl -X POST "$DEPLOY_HOOK_URL"
